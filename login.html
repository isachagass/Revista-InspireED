<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InspireED</title>
    <link rel="stylesheet" href="./css/style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>
<body style="height: 100vh; background-color: rgb(241, 241, 241);" class="d-flex justify-content-center align-items-center">
    <div class="container d-flex m-auto " style="height: 80vh;">
        <div id="esquerdaLogin" class="rounded w-50 d-flex align-items-center flex-column" style="background-color: var(--rosa);">
            <img src="./images/logo_InspireED.png" alt="Logo InspireED" class="w-50 mt-5">
            <h1 class="text-center text-white fs-2 fw-semibold">Bem Vindo de Volta!</h1>
            <h2 class="text-center text-white fs-5 fw-semibold">Acesse sua conta agora <br> mesmo</h2>
            <button type="button" class="btn btn-lg botoes mt-5">Entrar</button>
            <a href="" class="text-white mt-3">Esqueci minha senha</a>
        </div>
        <div id="direitaLogin" class="w-50 d-flex flex-column align-items-center justify-content-center" style="background-color: white;">
            <h1 class="text-center fw-semibold mb-3" style="color: var(--rosa);">Crie sua conta</h1>
            <form action="" method="get" class="d-flex flex-column align-items-center w-100 h-50">
                <label for="txtnome" class="visually-hidden">Nome</label>
                <input type="text" name="txtnome" id="txtnome" placeholder="Nome" class="border-0 input-L m-2 w-75">

                <label for="txtnome" class="visually-hidden">Email</label>
                <input type="email" name="txtmail" id="txtmail" placeholder="Email" class="border-0 input-L m-2 w-75">

                <label for="txtnome" class="visually-hidden">Senha</label>
                <input type="password" name="txtsenha" id="txtsenha" placeholder="Senha" class="border-0 input-L m-2 w-75">

                <button type="button" class="btn btn-lg botoes mt-5" onclick="window.location.href='index.html'">Cadastre-se</button>

            </form>
        </div>


    </div>

     
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>
</html>
