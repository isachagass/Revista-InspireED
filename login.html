<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InspireED</title>
    <link rel="stylesheet" href="./css/style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="./css/style_login.css">
    
</head>
<body class="d-flex justify-content-center align-items-center flex-column" style="height: 90vh; background-color: var(--cinza);">
    
    <div class="container shadow" id="container-login">
        <div class="form-container sign-up">
            <form action="index.html">
                <h1>Cadastro</h1>
                
                <input type="text" placeholder="Nome">
                <input type="email" placeholder="Emaill">
                <input type="password" placeholder="Senha">
                <button type="submit" id="bt_Cadastrar" onclick="Cadastrar()">Cadastrar</button>
            </form>
        </div>
        <div class="form-container sign-in">
            <form action="index.html">
                <h1>Login</h1> 
                
                
                <input type="text" placeholder="Nome">
                <input type="password" placeholder="Senha">
                <a href="#" onclick="proximapag()">Esqueci minha senha</a>
                <button type="submit" id="bt_login">Login</button>
            </form>
        </div>
        <div class="toggle-container">
            <div class="toggle">
                <div class="toggle-panel toggle-left" style="background-color: var(--rosa);">
                    <img src="./images/logo_InspireED.png" alt="Logo InspireED" class="w-50 mt-5">
                    <h1 class="text-center text-white fs-2 fw-semibold">Bem Vindo de Volta!</h1>
                    <h2 class="text-center text-white fs-5 fw-semibold">Acesse sua conta agora <br> mesmo</h2>
                    
                    <button class="hidden" id="login">Login</button>
                    <a href="" class="text-white mt-3">Esqueci minha senha</a>
                </div>
                <div class="toggle-panel toggle-right" style="background-color: var(--rosa);">
                    <img src="./images/logo_InspireED.png" alt="" class="w-50 mb-4 botoes">
                    <h2>Seja Bem-Vindo!</h2>
                    <p>Ainda não tem uma conta?</p>
                    
                    <button class="hidden" id="register">cadastre-se</button>
                </div>
            </div>
        </div>
    </div>
     
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    
    <script>
        const container = document.getElementById('container-login');
        const registerBtn = document.getElementById('register');
        const loginBtn = document.getElementById('login');
        const bt_login_prox = document.getElementById('bt_login');
        const bt_cadastrar_prox = document.getElementById('bt_Cadastrar');



        registerBtn.addEventListener('click', () => {
            container.classList.add("active");
        });

        loginBtn.addEventListener('click', () => {
            container.classList.remove("active");
        });


        bt_login_prox.addEventListener('click', () =>{
            alert("Login realizado com sucesso!")
            window.location.href = "./index.html";
            
        })

        function Cadastrar(){
            alert("Cadastro realizado com sucesso!")
            window.location.href = "index.html";
        }

        function proximapag(){
            // window.location.href = "esqueci_senha.html"
        }


    </script>
</body>
</html>
