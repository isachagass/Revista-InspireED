<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar Questões</title>
    <link rel="stylesheet" href="./css/style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>

<body>
    <header class="header">
        <nav class="navbar navbar-expand-lg" style="background-color: var(--rosa);">
            <div class="container-fluid">

                <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                    data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent"
                    aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarSupportedContent">
                    <img src="./images/logo_InspireED.png" alt="" style="height: 50px;">
                    <ul class="navbar-nav ms-auto mb-2 mb-lg-0 fs-5">
                        <li class="nav-item">
                            <a class="nav-link active text-light" aria-current="page" href="#">Home</a>
                        </li>
                        <li class="nav-item dropdown">
                            <a class="nav-link dropdown-toggle text-white" href="#" role="button"
                                data-bs-toggle="dropdown" aria-expanded="false">
                                Catálogo
                            </a>
                            <ul class="dropdown-menu">
                                <li><a class="dropdown-item" href="#">Jogos</a></li>

                                <li>
                                    <hr class="dropdown-divider">
                                </li>
                                <li><a class="dropdown-item" href="#">Mural de avisos</a></li>
                            </ul>
                        </li>

                        <li class="nav-item dropdown">
                            <a class="nav-link dropdown-toggle text-white" href="#" role="button"
                                data-bs-toggle="dropdown" aria-expanded="false">
                                Educação
                            </a>
                            <ul class="dropdown-menu">
                                <li><a class="dropdown-item" href="#">Ciências</a></li>
                                <li><a class="dropdown-item" href="#">Filosofia</a></li>
                                <li><a class="dropdown-item" href="#">Geografia</a></li>
                                <li><a class="dropdown-item" href="./historia.html">História</a></li>
                                <li><a class="dropdown-item" href="#">Inglês</a></li>
                                <li><a class="dropdown-item" href="#">Geografia</a></li>
                                <li><a class="dropdown-item" href="#">Matemática</a></li>
                                <li><a class="dropdown-item" href="#">Português</a></li>
                                <li><a class="dropdown-item" href="#">Sociologia</a></li>
                            </ul>
                        </li>

                        <li class="nav-item">
                            <a class="nav-link text-white" href="#">Login <i class="bi bi-person-circle"></i></i></a>
                        </li>


                    </ul>

                </div>
            </div>
        </nav>
    </header>

    <main class="m-auto pt-3" style="width: 85%;">
        <a href="./index.html"><i class="bi bi-arrow-left-circle-fill"></i></a>

        <div class="d-flex justify-content-around ">

            <div class="d-flex flex-column align-items-center" id="div_user">
                <img src="./images/user_img.jpg" alt="" class="rounded-circle border border-3 object-fit-cover">
                <h2 class="mt-3">Nome Da Pessoa</h2>
                <div class="botoes fs-5 mt-2 fw-normal">Professor</div>

                <a href="" class="mt-3">Sair <i class="bi bi-box-arrow-in-right fs-5"></i></a>

            </div>

            <div class="criar-livro-div">
                <h1 class="botoes fs-3 w-50 fw-normal">Adicionar Questão</h1>
                <div class="caixaTxt_livros p-2">
                    <div class="">
                        <form action="" class="d-flex flex-column form_criar">
                                
                            <select id="materia_questao" name="materia_questao" required class="mt-2 mb-2">
                                <option value="1">Biologia</option>
                                <option value="2">Filosofia</option>
                                <option value="3">Física</option>
                                <option value="4">Geografia</option>
                                <option value="5">História</option>
                                <option value="6">Inglês</option>
                                <option value="7">Matemática</option>
                                <option value="8">Português</option>
                                <option value="9">Química</option>
                                <option value="10">Sociologia</option>
                                <option value=""  class="selecionada" disabled selected>Selecione uma matéria</option>

                            </select>

                            <select id="tema_questao" name="tema_questao" required class="mt-2" >
                                <option value="1">Revolução Francesa</option>
                                <option value="2">Primeira Guerra Mundial</option>
                                <option value="3">Guerra Fria</option>
                                <option value="4">Revolução Industrial</option>
                                <option value=""  class="selecionada" disabled selected>Selecione um tema:</option>

                            </select>

                            

                            <label for="txt_questao" class="mt-2">Questão:</label>
                            <textarea name="txt_questao" id="txt_questao" class="form-control" rows="5"
                                required ></textarea>

                            <label for="explicacao_questao" class="mt-2">Explicação:</label>
                            <textarea name="explicacao_questao" id="explicacao_questao" class="form-control" rows="5"
                                required ></textarea>


                            <div class="add_img_livro mt-2 d-flex justify-content-end">
                                <button class="botoes fw-normal p-1 ps-2 pe-2">Adicionar Imagem <i class="bi bi-box-arrow-in-down"></i></button>
        
                                <button class="botoes fw-normal p-1" style="background-color: #a3e047;">Postar</button>
                            </div>
                        </form>
                    </div>

                    




                </div>
            </div>
        </div>








    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
</body>

</html>
