<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="login2.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400..700&family=Lobster+Two:ital,wght@0,400;0,700;1,400;1,700&family=Sigmar&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">

    <style>
        *{
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    /* color: #fff; */
}


body{
    background-color: #000330;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    height: 90vh;
 
}
.star{
    position: absolute;
    width: 2px;
    height: 2px;
    background-color: white;
    animation: move 5s linear infinite;
    opacity: 0,5;
    z-index: 1;
    
}

@keyframes move {
    0% { transform: scale(1); opacity: 1;}
    100% { transform: scale(0); opacity: 0;}
}


/* header{
    width: 100%;
    height: 5%;
    z-index: 2;
    margin-left: 3%;
    
} */


nav{
    width: 20%;
}

 .title{
   margin-left: 2%;
}

.title h2{
    font-family: "Sigmar", sans-serif;
    font-weight: 500;
    font-style: normal;
    /* margin-bottom: 5px; */
    font-size: 40px;
    color: #ffffff;
}

#insider{
    margin: 0;
    font-family: "Caveat", cursive;
    font-optical-sizing: auto;
    font-weight: 700;
    font-style: normal;
    color: red;
    letter-spacing: 4px;
    font-size: 20px;
    
}

.container{
    background-color: #fff;
    border-radius: 30px;
    box-shadow: 0 5px 15px rgba(0, 0, 0, 0.35);
    position: relative;
    overflow: hidden;
    width: 60%;
    max-width: 100%;
    min-height: 480px;
    /* z-index: 3; */
}

.container p{
    font-family: Arial, Helvetica, sans-serif;
    font-size: 15   px;
    line-height: 20px;
    letter-spacing: 0.3px;
    margin: 20px 0;
}

.container span{
    font-size: 12px;
}

.container a {
    font-family: Arial, Helvetica, sans-serif;
    color: #333;
    font-size: 13px;
    text-decoration: none;
    margin: 15px 0 10px
}

.container button{
    font-family: Arial, Helvetica, sans-serif;
    background-color: #000330;
    color: #fff;
    font-size: 12px;
    padding: 10px 45px;
    border: 1px solid transparent;
    border-radius: 8px;
    font-weight: 600;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    margin-top: 10px;
    cursor: pointer;
}

.container button.hidden{
    background-color: transparent;
    border-color: #fff;
}

.container form{
    background-color: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    padding: 0 40px;
    height: 100%;
}

.container input{
    background-color: #eee;
    border: none;
    margin: 8px 0;
    padding: 10px 15px;
    font-size: 13px;
    border-radius: 8px;
    width: 100%;
    outline: none;

}

.form-container{
    position: absolute;
    top: 0;
    height: 100%;
    transform: all 0.6s ease-in-out;
  
}

h1{
    font-family: "Poppins", sans-serif;
  font-weight: 400;
  font-style: normal;
}

.sign-in{
    left: 0;
    width: 50%;
    z-index: 2;
    opacity: 1;
}

.container.active .sign-in{
    transform: translateX(100%);
}

.sign-up{
    left: 0;
    width: 50%;
    opacity: 0;
    z-index: 1;
}

.container.active .sign-up{
    transform: translateX(100%);
    opacity: 1;
    z-index: 5;
    animation: move 0.6s;
}

@keyframes move{
    0%,
    49.99% { opacity: 0; z-index: 1;}
    50%,
    100% { opacity: 1; z-index: 5;}
}



.toggle-container{
    position: absolute;
    top: 0;
    left: 50%;
    width: 50%;
    height: 100%;
    overflow: hidden;
    transition: all 0.6s ease-in-out;
    border-radius: 150px 0 0 100px;
    z-index: 1000;
}

.container.active .toggle-container{
    transform: translateX(-100%);
    border-radius: 0 150px 100px 0;
}

.toggle {
    background-color: #000330;
    height: 100%;
    /* background: linear-gradient(to right, #0003306c, #000330); */
    color: #fff;
    position: relative;
    left: -100%;
    height: 100%;
    width: 200%;
    transform: translateX(0);
    transition: all 0.6s ease-in-out;
}

.container.active .toggle{
    transform: translateX(50%);
}

.toggle-panel{
    position: absolute;
    width: 50%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    padding: 0 30px;
    text-align: center;
    top: 0;
    transform: translateX(0);
    transition: all 0.6s ease-in-out;
}

.toggle-left{
    transform: translateX(-200%);
}

.container.active .toggle-left{
    transform: translateX(0);
}

.toggle-right{
    right: 0;
    transform: translateX(0);
}

.container.active .toggle-right{
    transform: translateX(200%);
}

    </style>
</head>
<body>
   
    <div class="container" id="container">
        <div class="form-container sign-up">
            <form action="">
                <h1>Cadastro</h1>
                
                <input type="text" placeholder="Nome">
                <input type="email" placeholder="Emaill">
                <input type="password" placeholder="Senha">
                <button type="submit" onclick="Cadastro()">Cadastrar</button>
            </form>
        </div>
        <div class="form-container sign-in">
            <form action="">
                <h1>Login</h1> 
                
                
                <input type="text" placeholder="Nome">
                <input type="password" placeholder="Senha">
                <a href="#" onclick="proximapag()">Esqueci minha senha</a>
                <button type="submit" onclick="Login()">Login</button>
            </form>
        </div>
        <div class="toggle-container">
            <div class="toggle">
                <div class="toggle-panel toggle-left">
                    <img src="./images/logo_InspireED.png" alt="Logo InspireED" class="w-50 mt-5">
                    <h1 class="text-center text-white fs-2 fw-semibold">Bem Vindo de Volta!</h1>
                    <h2 class="text-center text-white fs-5 fw-semibold">Acesse sua conta agora <br> mesmo</h2>
                    
                    <button class="hidden" id="login">Login</button>
                    <a href="" class="text-white mt-3">Esqueci minha senha</a>
                </div>
                <div class="toggle-panel toggle-right">
                    <img src="./images/logo_InspireED.png" alt="" class="w-50 mb-4 botoes">
                    <h2>Seja Bem-Vindo!</h2>
                    <p>Ainda não tem uma conta?</p>
                    
                    <button class="hidden" id="register">cadastre-se</button>
                </div>
            </div>
        </div>
    </div>
    <footer>
        
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>

    <script>
        const container = document.getElementById('container');
        const registerBtn = document.getElementById('register');
        const loginBtn = document.getElementById('login');

        registerBtn.addEventListener('click', () => {
            container.classList.add("active");
        });

        loginBtn.addEventListener('click', () => {
            container.classList.remove("active");
        });

        for (let i=0; i< 1000; i++) {
            const star = document.createElement ('div');
            star.className = 'star';
            document.body.appendChild(star);
            star.style.left = `${Math.random()* 100}vw`;
            star.style.top = `${Math.random()* 100}vh`;
            star.style.width = `${Math.random() * 3 + 1}px`;
            star.style.height = star.style.width;
            star.style.animationDuration = `${Math.random()* 6 + 4}s`;
        }

        function Login(){
            alert("Login realizado com sucesso!")
            window.location.href = "index.html"
            
        }

        function Cadastro(){
            alert("Cadastro realizado com sucesso! Volte para a página de login")
        }

        function proximapag(){
            // window.location.href = "esqueci_senha.html"
        }

    </script>
</body>
</html>
